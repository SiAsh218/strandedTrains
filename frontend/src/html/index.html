<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/styles/styles.css" />
    <title>Stranded Trains Board</title>
  </head>
  <body>
    <header>
      <div
        style="
          width: 100%;
          display: flex;
          align-items: center;
          justify-content: space-between;
        "
      >
        <button style="width: 80px; height: 40px" class="btn" id="btn-login">
          Login
        </button>

        <input id="date-time--dev" class="hidden" type="datetime-local" />

        <span>STRANDED TRAINS BOARD</span>

        <div
          style="
            width: 80px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
          "
        >
          <button
            style="width: 80px; height: 40px"
            class="btn {{if_isLoggedIn}} {{else}}hidden{{/if_isLoggedIn}}"
            id="btn-add"
          >
            + New
          </button>
        </div>
      </div>
    </header>
    <main>
      <div style="padding: 10px 10px">
        <div id="popup" class="popup">
          <div class="popup-box">
            There are currently no stranded trains recorded on the network
          </div>
        </div>
        <table class="table--stranded-trains hidden">
          <thead>
            <tr>
              <th style="width: 50px">H/C</th>
              <th style="width: 150px">LOCATION</th>
              <th style="width: 120px">STOOD AT</th>
              <th style="width: 90px">DUR</th>
              <th style="width: 100px">CONTACT</th>
              <th style="width: 100px">STATUS</th>
              <th style="width: 80px">
                <!--  Passenger Loading -->
                LOADING
              </th>
              <th style="width: 50px">
                <!-- Toilets  -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="0 0 24 24"
                  height="24"
                  width="24"
                >
                  <path
                    fill="#ffffff"
                    fill-rule="evenodd"
                    d="M12.962 22.9663h-2V1.03369h2zM4.52352 8.37646c1.23954 0 2.28901 0.85782 2.5752 2.00194l1.42968 5.8174c0.38144 0.2861 0.09565 0.5723 -0.19043 0.5723H6.81258l-0.66796 4.8632c-0.00019 0.1907 -0.19063 0.3809 -0.47657 0.3809H3.66512c-0.28567 -0.0002 -0.47637 -0.1903 -0.47656 -0.3809l-0.66699 -4.8632H0.995201c-0.285886 -0.0003 -0.571693 -0.2864 -0.476562 -0.5723L1.9493 10.3784c0.28619 -1.2393 1.33484 -2.0018 2.57422 -2.00194m14.78128 0c2.2883 0.00025 4.1951 1.90694 4.1953 4.19534v3.2422c0 0.572 -0.3812 0.9539 -0.9531 0.9541h-1.1446l-0.6679 4.8632c-0.0002 0.1907 -0.1907 0.3809 -0.4766 0.3809H18.255c-0.2857 -0.0002 -0.4764 -0.1903 -0.4766 -0.3809l-0.667 -4.8632h-1.1445c-0.5722 0 -0.9541 -0.382 -0.9541 -0.9541v-3.2422c0.0001 -2.3839 1.8128 -4.29069 4.292 -4.19534M4.71493 1.98682c1.47444 0.0002 2.66992 1.19641 2.66992 2.67089 -0.00022 1.47431 -1.19562 2.66972 -2.66992 2.66993 -1.47448 0 -2.6697 -1.1955 -2.66992 -2.66993 0 -1.47461 1.1953 -2.67089 2.66992 -2.67089m14.49417 0c1.4746 0 2.6699 1.19628 2.6699 2.67089 -0.0002 1.47443 -1.1955 2.66993 -2.6699 2.66993 -1.4745 -0.00001 -2.6697 -1.1955 -2.67 -2.66993 0 -1.47461 1.1954 -2.67088 2.67 -2.67089"
                    clip-rule="evenodd"
                    stroke-width="1"
                  ></path>
                </svg>
              </th>
              <th style="width: 50px">
                <!-- Vulnerable People  -->
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  fill="none"
                  viewBox="4 0 24 24"
                  id="Accessible--Streamline-Sharp-Material"
                  height="24"
                  width="24"
                >
                  <desc>
                    Accessible Streamline Icon: https://streamlinehq.com
                  </desc>
                  <path
                    fill="#ffffff"
                    d="M12.05 5.65c-0.5 0 -0.92915 -0.17915 -1.2875 -0.5375 -0.35835 -0.358335 -0.5375 -0.7875 -0.5375 -1.2875 0 -0.5 0.17915 -0.929165 0.5375 -1.2875C11.12085 2.179165 11.55 2 12.05 2c0.5 0 0.92915 0.179165 1.2875 0.5375 0.35835 0.358335 0.5375 0.7875 0.5375 1.2875 0 0.5 -0.17915 0.929165 -0.5375 1.2875 -0.35835 0.35835 -0.7875 0.5375 -1.2875 0.5375ZM17.4 22V16.775H10.25V8.8c0 -0.5 0.175 -0.925 0.525 -1.275 0.35 -0.35 0.775 -0.525 1.275 -0.525 0.38335 0 0.70835 0.075 0.975 0.225 0.26665 0.15 0.58335 0.44165 0.95 0.875 0.7 0.81665 1.46665 1.5 2.3 2.05 0.83335 0.55 1.74165 0.84165 2.725 0.875v1.5c-0.85 0 -1.725 -0.20835 -2.625 -0.625 -0.9 -0.41665 -1.76665 -0.975 -2.6 -1.675v4.575H18.9V22h-1.5Zm-7.5 0c-1.38335 0 -2.54585 -0.47085 -3.4875 -1.4125C5.47085 19.64585 5 18.48335 5 17.1c0 -1.13335 0.4125 -2.17915 1.2375 -3.1375C7.0625 13.00415 8.15 12.45 9.5 12.3v1.525c-0.9 0.08335 -1.62085 0.45415 -2.1625 1.1125 -0.54165 0.65835 -0.8125 1.37915 -0.8125 2.1625 0 0.96665 0.32085 1.775 0.9625 2.425C8.12915 20.175 8.93335 20.5 9.9 20.5c0.78335 0 1.50835 -0.27085 2.175 -0.8125 0.66665 -0.54165 1.03335 -1.2625 1.1 -2.1625h1.525c-0.13335 1.33335 -0.68335 2.4125 -1.65 3.2375C12.08335 21.5875 11.03335 22 9.9 22Z"
                    stroke-width="0.5"
                  ></path>
                </svg>
              </th>
              <th style="width: 100px">TOLO</th>
              <th style="width: 100px">CHAMPION</th>
              <th>PLAN</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <!-- {{strandedTrains_template}}
            <tr data-database-id="{{id}}" class="stranded-train-row">
              <td class="td--headcode">{{headcode}}</td>
              <td class="td--location">{{location}}</td>
              <td class="td--stranded-at">{{strandedAt}}</td>
              <td class="duration"></td>
              <td class="td--contact">{{contact}}</td>
              <td class="td--status">{{status}}</td>
              <td class="td--passenger-loading">{{passengerLoading}}</td>
              <td class="td--toilets-working">{{toiletsWorking}}</td>
              <td class="td--vulnerable-people">{{vulnerablePeople}}</td>
              <td class="td--tolo">{{tolo}}</td>
              <td class="td--champion">{{strandedTrainChampion}}</td>
              <td class="td--plan">
                <b>Plan A</b><br />{{planA}}<br /><b>Plan B</b
                ><br />{{planB}}<br /><b>Plan C</b><br />{{planC}}
              </td>
            </tr>
            {{/strandedTrains_template}} -->
          </tbody>
        </table>
      </div>
      <div></div>
    </main>

    <!-- Modal Login -->
    <div class="modal-backdrop hidden" id="modalLoginBackdrop">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalLoginTitle"
      >
        <header class="modal-header">
          <h2 id="modalLoginTitle">Login</h2>
          <button class="modal-close" id="closeModalLogin" aria-label="Close">
            ×
          </button>
        </header>

        <form class="modal-form modal-form--login" id="loginForm">
          <div class="form-group">
            <label for="input--username">Username</label>
            <input type="text" id="input--username" name="username" />
          </div>
          <div class="form-group">
            <label for="input--password">Password</label>
            <input type="password" id="input--password" name="password" />
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-backdrop hidden" id="modalBackdrop">
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
      >
        <header class="modal-header">
          <h2 id="modalTitle">Add Stranded Train</h2>
          <button class="modal-close" id="closeModal" aria-label="Close">
            ×
          </button>
        </header>

        <form
          class="modal-form modal-form--stranded-trains"
          data-mode="new"
          data-database-id=""
        >
          <div class="form-group-row">
            <div class="form-group">
              <label
                class="required"
                for="input--headcode"
                data-error="Headcode is a required field"
                >Headcode</label
              >
              <input type="text" id="input--headcode" name="headcode" />
            </div>

            <div class="form-group">
              <label
                class="required"
                data-error="Location is a required field"
                for="input--location"
                >Location</label
              >
              <input
                type="text"
                id="input--location"
                placeholder="Either exact location or between X and Y"
                name="location"
              />
            </div>

            <div class="form-group">
              <label for="input--location-w3w">Location What3Words</label>
              <input type="text" id="input--location-w3w" name="location-w3w" />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--traction">Traction</label>
              <select id="input--traction" name="traction">
                <option value=""></option>
                <option value="Diesel Only">Diesel Only</option>
                <option value="Electric Only">Electric Only</option>
                <option value="Battery Only">Battery Only</option>
                <option value="Bi-Mode">Bi-Mode</option>
              </select>
            </div>

            <div class="form-group">
              <label
                class="required"
                data-error="Stranded At is a required field"
                for="input--stranded-at"
                >Came To A Stand At</label
              >
              <input
                type="datetime-local"
                id="input--stranded-at"
                name="stranded-at"
              />
            </div>

            <div class="form-group">
              <label for="input--ccil-ref">CCIL Ref</label>
              <input
                class="input-hide-number-arrows"
                type="text"
                inputmode="numeric"
                id="input--ccil-ref"
                name="ccil-ref"
              />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label
                data-error="Contact On Train is a required field"
                class="required"
                for="input--contact"
                >Contact On Train</label
              >
              <input type="text" id="input--contact" name="contact" />
            </div>

            <div class="form-group">
              <label for="input--contact-no">Contact On Train No</label>
              <input
                class="input-hide-number-arrows"
                type="number"
                inputmode="numeric"
                id="input--contact-no"
                name="contact-no"
              />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--responder">Responding Contact</label>
              <input type="text" id="input--responder" name="responder" />
            </div>

            <div class="form-group">
              <label for="input--responder-no">Responding Contact No</label>
              <input
                class="input-hide-number-arrows"
                type="number"
                inputmode="numeric"
                id="input--responder-no"
                name="responder-no"
              />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label
                class="required"
                data-error="Status is a required field"
                for="input--status"
                >Status</label
              >
              <select id="input--status" name="status">
                <option value=""></option>
                <option value="Stranded">Stranded</option>
                <option value="Trapped">Trapped</option>
                <option value="Evacuation">Evacuation</option>
                <option value="Rescued">On The Move</option>
              </select>
            </div>

            <div
              class="form-group form-group--rescued-at"
              id="form-group--rescued-at"
            >
              <label for="input--rescued-at">On The Move At</label>
              <input
                type="datetime-local"
                id="input--rescued-at"
                disabled
                name="rescued-at"
              />
            </div>

            <div class="form-group">
              <label for="input--tolo">TOLO Assigned</label>
              <select id="input--tolo" name="tolo">
                <option value=""></option>
                <option value="Assigned">Assigned</option>
                <option value="On Route">On Route</option>
                <option value="Not Assigned">Not Assigned</option>
              </select>
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--passenger-loading">Passenger Loading</label>
              <select id="input--passenger-loading" name="passenger-loading">
                <option value=""></option>
                <option value="Low">Low - Plenty Of Seats</option>
                <option value="Medium">
                  Medium - All Passenegers Have Seats
                </option>
                <option value="High">
                  High - Some People Stood In Vestibules
                </option>
                <option value="Very High">
                  Very High - People Standing Throughout
                </option>
                <option value="Unknown">Unknown</option>
              </select>
            </div>

            <div class="form-group">
              <label for="input--passenger-count">Passenger Count</label>
              <input
                class="input-hide-number-arrows"
                type="text"
                inputmode="numeric"
                id="input--passenger-count"
                name="passenger-count"
              />
            </div>

            <div class="form-group">
              <label for="input--vulnerable-people">Vulnerable People</label>
              <select id="input--vulnerable-people" name="vulnerable-people">
                <option value=""></option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3+">3+</option>
                <option value="Unknown">Unknown</option>
              </select>
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--toilets-working">Toilets Working</label>
              <select id="input--toilets-working" name="toilets-working">
                <option value=""></option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
                <option value="Unknown">Unknown</option>
              </select>
            </div>

            <div class="form-group">
              <label for="input--number-of-staff"
                >Number of Staff Onboard</label
              >
              <input
                class="input-hide-number-arrows"
                type="text"
                inputmode="numeric"
                id="input--number-of-staff"
                name="number-of-staff"
              />
            </div>

            <div class="form-group">
              <label for="input--mood-onboard">Mood Onboard</label>
              <input type="text" id="input--mood-onboard" name="mood-onboard" />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--heating-required">Heating</label>
              <select id="input--heating-required" name="heating-required">
                <option value=""></option>
                <option value="Fully Operational">Fully Operational</option>
                <option value="Not Operational">Not Operational</option>
                <option value="Partially Operational">
                  Partially Operational
                </option>
                <option value="Not Required">Not Required</option>
              </select>
            </div>

            <div class="form-group">
              <label for="input--air-cooling-required">Air Cooling</label>
              <select
                id="input--air-cooling-required"
                name="air-cooling-required"
              >
                <option value=""></option>
                <option value="Fully Operational">Fully Operational</option>
                <option value="Not Operational">Not Operational</option>
                <option value="Partially Operational">
                  Partially Operational
                </option>
                <option value="Not Required">Not Required</option>
              </select>
            </div>

            <div class="form-group">
              <label for="input--lighting">Lighting</label>
              <select id="input--lighting" name="lighting">
                <option value=""></option>
                <option value="Fully Operational">Fully Operational</option>
                <option value="Not Operational">Not Operational</option>
                <option value="Partially Operational">
                  Partially Operational
                </option>
                <option value="Not Required">Not Required</option>
              </select>
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--stranded-train-champion"
                >Stranded Train Champion</label
              >
              <input
                type="text"
                id="input--stranded-train-champion"
                name="stranded-train-champion"
              />
            </div>

            <div class="form-group">
              <label for="input--champion-no">Champion No</label>
              <input
                class="input-hide-number-arrows"
                type="number"
                inputmode="numeric"
                id="input--champion-no"
                name="champion-no"
              />
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--plan-a">Plan A</label>
              <textarea id="input--plan-a" name="plan-a" rows="4"></textarea>
            </div>

            <div class="form-group">
              <label for="input--plan-b">Plan B</label>
              <textarea id="input--plan-b" name="plan-b" rows="4"></textarea>
            </div>

            <div class="form-group">
              <label for="input--plan-c">Plan C</label>
              <textarea id="input--plan-c" name="plan-c" rows="4"></textarea>
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label for="input--other-affected-trains"
                >Other Affected Trains</label
              >
              <textarea
                id="input--other-affected-trains"
                name="other-affected-trains"
                rows="4"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="input--additional-information"
                >Additional Information</label
              >
              <textarea
                id="input--additional-information"
                name="additional-information"
                rows="4"
              ></textarea>
            </div>
          </div>

          <div class="form-group-row">
            <div class="form-group">
              <label
                class="required"
                data-error="Last Contact Time is a required field"
                for="input--last-contact-time"
                >Last Contact Time</label
              >
              <input
                type="datetime-local"
                id="input--last-contact-time"
                name="last-contact-time"
              />
            </div>

            <div class="form-group">
              <label
                for="input--last-contact-person"
                class="required"
                data-error="Last Contact Person is a required field"
                >Last Contact Person</label
              >
              <input
                type="text"
                id="input--last-contact-person"
                name="last-contact-person"
              />
            </div>

            <div class="form-group">
              <label for="input--contact-record">Contact Record</label>
              <textarea
                id="input--contact-record"
                name="contact-record"
                rows="4"
                disabled
              ></textarea>
            </div>
          </div>

          <div class="form-group-row">
            <div
              class="form-group hidden form-group--priority"
              id="form-group--priority"
            >
              <label for="input--priority">Priority</label>
              <input
                type="number"
                min="1"
                id="input--priority"
                name="priority"
                min="1"
              />
            </div>

            <div
              class="form-group hidden form-group--last-updated"
              id="form-group--last-updated"
            >
              <label for="input--last-updated">Last Updated</label>
              <input
                type="text"
                id="input--last-updated"
                name="last-updated"
                disabled
              />
            </div>
          </div>

          <div class="modal-footer">
            <button type="submit" class="btn">Save</button>
          </div>
        </form>
      </div>
    </div>
    <footer></footer>
    <script type="module" src="/dist/bundle.js"></script>
  </body>
</html>
